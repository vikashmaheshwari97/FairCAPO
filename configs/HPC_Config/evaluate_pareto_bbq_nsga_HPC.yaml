# Held-out Dtest of the NSGA-II-PO + fairness baseline's BBQ HPC portfolio.
#
# Identical to evaluate_pareto_bbq_HPC.yaml (same active Dtest=100 split, same held-out
# fairness set, same max(|sAMB|,|sDIS|) scoring) EXCEPT the input portfolio and
# the output dir. All three methods (FairCAPO / ablation / NSGA-II-PO) share
# ONE held-out basis for comparable inference-cost + fairness numbers.
experiment_name: evaluate_pareto_bbq_nsga_hpc

portfolio_csv: outputs/hpc/bbq_nsga2po_1m/seed_0/nsga2_po_pareto_portfolio.csv

output_dir: outputs/hpc/evaluation/seed_0/bbq_nsga2po_1m

dataset: bbq
task_type: multiple_choice
seed: 0
test_size: 200                     # 1M RUN; HALF-SIZE SMOKE: 100; PAPER-SCALE: 500
stratified: false
allow_smaller: true

labels: []

evaluation:
  use_llm: true
  require_final_answer_tags: true

fairness:
  in_loop: true
  mode: bbq_bias_score
  bbq_score: max_amb_dis
  fairness_data: data/fairness_bbq_holdout.jsonl
  eval_pairs: 36                   # 1M RUN; HALF-SIZE SMOKE: 24; HIGH-RES: 180

llm:
  backend: lmstudio  # OpenAI-compatible chat API; SLURM serves it with vLLM.
  model_id: mistralai/mistral-small-3.2
  # Default for manual/local OpenAI-compatible servers. On UT Rocket, the
  # SLURM wrapper starts vLLM and overrides this with FAIRCAPO_LLM_API_URL.
  api_url: http://localhost:1234/v1
  temperature: 0.0
  num_predict: 96
  timeout: 900

cost:
  input_weight: 0.08
  output_weight: 0.32

objectives:
  - name: performance
    direction: maximize
  - name: cost
    direction: minimize
  - name: risk
    direction: minimize
  - name: fairness_risk
    direction: minimize

bounds:
  performance: [0.0, 1.0]
  cost: [0.0, 6000.0]             # HALF-SIZE SMOKE: [0.0, 3000.0]; PAPER-SCALE: [0.0, 10000.0]
  risk: [0.0, 1.0]
  fairness_risk: [0.0, 1.0]

metrics:
  num_preference_vectors: 500
  seed: 0
