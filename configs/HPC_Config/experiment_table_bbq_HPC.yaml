# Cross-method experiment comparison table — BBQ (fairness-varying showcase) HPC.
#
# Active Rocket reporting scale: FairCAPO 500k v3 seed 0 against existing 500k
# v2 baselines, LARGE held-out diagnostic.
# Search still used Ddev=75, Dshot=25, Dtest=100, budget=500k, but reporting
# uses only outputs/hpc/evaluation_large/... CSVs as the objective basis.
# Standard outputs/hpc/evaluation/... is intentionally not used for BBQ reports
# because its fairness resolution is too coarse and creates misleading ties.
#
# Core rows:
#   - FairCAPO (perf + cost + risk + canonical BBQ bias-score fairness)
#   - MO-CAPO (fairness OFF)  -> the ablation
#   - NSGA-II-PO + fairness   -> off-the-shelf MOEA with the SAME real objectives
#
# Columns: performance, cost, risk, fairness_risk, HV, nR2, portfolio_size, budget_used,
#          HV_opt, HV_pes, Gap, holdout_inference_cost.

output_dir: outputs/experiment_table/bbq_mistral_hpc_500k_v3_vs_v2_large_seed0
dataset: BBQ
model: mistralai/mistral-small-3.2
seed: 0

objectives:
  - name: performance
    direction: maximize
  - name: cost
    direction: minimize
  - name: risk
    direction: minimize
  - name: fairness_risk
    direction: minimize

# Bounds for active 500k v2 large-held-out scale. 1M RUN: cost [0, 6000].
# PAPER-SCALE: cost [0, 10000].
bounds:
  performance: [0.0, 1.0]
  cost: [0.0, 6000.0]       # ACTIVE LARGE HELD-OUT; PAPER-SCALE: [0.0, 10000.0]
  risk: [0.0, 1.0]
  fairness_risk: [0.0, 1.0]

metrics:
  num_preference_vectors: 500
  seed: 0

methods:
  - name: FairCAPO
    type: pareto_set
    candidates_csv: outputs/hpc/evaluation_large/seed_0/bbq_faircapo_500k_v3/test_eval_candidates.csv
    only_pareto: true
    budget_json: outputs/hpc/bbq_faircapo_500k_v3/seed_0/budget_summary.json
    holdout_csv: outputs/hpc/evaluation_large/seed_0/bbq_faircapo_500k_v3/test_eval_candidates.csv

  - name: MO-CAPO (fairness off)
    type: pareto_set
    candidates_csv: outputs/hpc/evaluation_large/seed_0/bbq_ablation_500k_v2/test_eval_candidates.csv
    only_pareto: true
    budget_json: outputs/hpc/bbq_ablation_500k_v2/seed_0/budget_summary.json
    holdout_csv: outputs/hpc/evaluation_large/seed_0/bbq_ablation_500k_v2/test_eval_candidates.csv

  - name: NSGA-II-PO + fairness
    type: pareto_set
    candidates_csv: outputs/hpc/evaluation_large/seed_0/bbq_nsga2po_500k_v2/test_eval_candidates.csv
    only_pareto: true
    holdout_csv: outputs/hpc/evaluation_large/seed_0/bbq_nsga2po_500k_v2/test_eval_candidates.csv

  # Post-hoc fairness baseline: MO-CAPO fairness-OFF front re-scored with the
  # canonical BBQ scorer, then re-evaluated on the SAME held-out Dtest basis as
  # the other rows. This is a diagnostic row, not a separate search method.
  - name: Post-hoc fair. (held-out)
    type: pareto_set
    candidates_csv: outputs/hpc/evaluation_large/seed_0/bbq_posthoc_500k_v2/test_eval_candidates.csv
    only_pareto: true
    holdout_csv: outputs/hpc/evaluation_large/seed_0/bbq_posthoc_500k_v2/test_eval_candidates.csv
