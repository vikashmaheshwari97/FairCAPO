# Aggregate Stage A large-held-out BBQ results from the UT Rocket HPC layout.

base: outputs/hpc/evaluation_large/seed_{seed}
seeds: [0]
output_dir: outputs/experiment_table/bbq_mistral_hpc_500k_large

methods:
  - name: FairCAPO
    eval_subdir: bbq_faircapo
  - name: MO-CAPO (fairness off)
    eval_subdir: bbq_ablation
  - name: NSGA-II-PO + fairness
    eval_subdir: bbq_nsga2po
  - name: Post-hoc fair. (held-out)
    eval_subdir: bbq_posthoc
