# Held-out Dtest of the FairCAPO BBQ HPC portfolio.
#
# >>> TWO SCALES: the ACTIVE test_size=100 is the 500k Rocket v2 eval
# (configs/HPC_Config/phase2_budgeted_mocapo_bbq_HPC.yaml). Keep 1M values
# in comments until the 500k FairCAPO-vs-NSGA gap improves.
#
# Paper-scale: Dtest=500, fairness_holdout=36 pairs, max(|sAMB|,|sDIS|) scoring.
# Run AFTER the HPC search completes. The portfolio is scored on a held-out
# fairness item set that is DISJOINT from the in-loop one (build with:
#   python scripts/build_bbq_fairness_set.py --out data/fairness_bbq_holdout.jsonl \
#       --exclude data/fairness_bbq.jsonl --n-ambig 12 --n-disambig 6 --seed 7
# ).
#
# All three methods (FairCAPO / ablation / NSGA-II-PO) use the SAME Dtest split
# and the SAME held-out fairness set so they are comparable on one held-out basis.
experiment_name: evaluate_pareto_bbq_hpc

portfolio_csv: outputs/hpc/bbq_faircapo_500k_v2/seed_0/phase2_prompt_portfolio.csv

output_dir: outputs/hpc/evaluation/seed_0/bbq_faircapo_500k_v2

dataset: bbq
task_type: multiple_choice
seed: 0
test_size: 100                     # ACTIVE 500K; 1M RUN: 200; PAPER-SCALE: 500
stratified: false
allow_smaller: true

labels: []

evaluation:
  use_llm: true
  require_final_answer_tags: true

# Canonical BBQ bias score at test time on a held-out (disjoint) item set,
# so the Dtest fairness_risk is the SAME signal as the search-time objective.
fairness:
  in_loop: true
  mode: bbq_bias_score
  # max(|sAMB|, |sDIS|) — stays discriminative on held-out when |sAMB| saturates.
  bbq_score: max_amb_dis
  fairness_data: data/fairness_bbq_holdout.jsonl
  eval_pairs: 24                   # ACTIVE 500K; 1M RUN: 36; HIGH-RES: 180

llm:
  backend: lmstudio  # OpenAI-compatible chat API; SLURM serves it with vLLM.
  model_id: mistralai/mistral-small-3.2
  # Default for manual/local OpenAI-compatible servers. On UT Rocket, the
  # SLURM wrapper starts vLLM and overrides this with FAIRCAPO_LLM_API_URL.
  api_url: http://localhost:1234/v1
  temperature: 0.0
  num_predict: 96
  timeout: 900

cost:
  input_weight: 0.08
  output_weight: 0.32

objectives:
  - name: performance
    direction: maximize
  - name: cost
    direction: minimize
  - name: risk
    direction: minimize
  - name: fairness_risk
    direction: minimize

# HV/nR2 normalization bounds. Active 500k uses Dtest=100; widen for 1M/paper-scale.
# PAPER-SCALE: cost: [0.0, 10000.0]
bounds:
  performance: [0.0, 1.0]
  cost: [0.0, 3000.0]             # ACTIVE 500K; 1M RUN: [0.0, 6000.0]; PAPER-SCALE: [0.0, 10000.0]
  risk: [0.0, 1.0]
  fairness_risk: [0.0, 1.0]

metrics:
  num_preference_vectors: 500
  seed: 0
