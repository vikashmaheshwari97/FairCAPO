# NSGA-II-PO + fairness on BBQ — HPC / cluster config.
#
# The multi-objective baseline (off-the-shelf NSGA-II + CAPO operators) run with
# the SAME real objectives as FairCAPO on BBQ: multiple-choice accuracy, cost,
# risk, and the canonical BBQ bias score (max(|sAMB|, |sDIS|)). Routed through
# FairCAPO's shared LLMObjectiveEvaluator (see baselines/nsga2_po_runner.py), so
# the only difference vs FairCAPO is the search algorithm (no budgeted
# intensification).
#
# NSGA-II-PO is the MO-CAPO §4.2 baseline: it runs UNBUDGETED (full evaluation
# of every candidate, no token cap), exactly as in the MO-CAPO paper. The
# fairness-of-comparison is carried by the cost axis (quality-vs-cost), not by
# an iso-budget cap.
#
# >>> TWO SCALES IN THIS FILE <<<
# The ACTIVE settings are the 500k-token seed-0 Rocket v2 scale
# (Ddev=75, Dshots=25, Dtest=100). Keep 1M values in comments until
# FairCAPO's 500k edge over NSGA is stronger.
#
# To run on UT Rocket/Pegasus2:
#   The SLURM wrapper starts a local vLLM OpenAI-compatible server inside the
#   allocated GPU job and overrides llm.api_url via FAIRCAPO_LLM_API_URL.
#   Start with seed 0 only:
#     sbatch --array=0 scripts/hpc/run_bbq_nsga_hpc.slurm
#   Later, for paper variance bands:
#     sbatch --array=0-2 scripts/hpc/run_bbq_nsga_hpc.slurm
dataset: bbq
task_type: multiple_choice
seed: 0

output_dir: outputs/hpc/bbq_nsga2po_500k_v2/seed_0

prompt_pool: configs/phase2_prompt_pool_bbq.yaml

task_description: >
  Each item gives a short context, a question, and three options (A, B, C), one
  of which is an "unknown / cannot be determined" choice. Pick the single correct
  option, returned between the markers <final_answer>A</final_answer>.

labels: []

dev:
  dataset: bbq
  dev_size: 75            # ACTIVE 500K; 1M RUN: 150; PAPER-SCALE: 300
  shots_size: 25          # ACTIVE 500K; 1M RUN: 50; PAPER-SCALE: 100
  test_size: 100          # ACTIVE 500K; 1M RUN: 200; PAPER-SCALE: 500
  stratified: false
  allow_smaller: true

llm:
  backend: lmstudio  # OpenAI-compatible chat API; SLURM serves it with vLLM.
  model_id: mistralai/mistral-small-3.2
  # Default for manual/local OpenAI-compatible servers. On UT Rocket, the
  # SLURM wrapper starts vLLM and overrides this with FAIRCAPO_LLM_API_URL.
  api_url: http://localhost:1234/v1
  temperature: 0.0
  num_predict: 96
  timeout: 900

evaluation:
  use_llm: true
  require_final_answer_tags: true

cost:
  input_weight: 0.08
  output_weight: 0.32

# Same real in-loop BBQ bias-score fairness as FairCAPO (shared evaluator).
fairness:
  in_loop: true
  mode: bbq_bias_score
  bbq_score: max_amb_dis
  fairness_data: data/fairness_bbq.jsonl
  eval_pairs: 24          # ACTIVE 500K v2; OLD 500K: 12; 1M RUN: 36

# NSGA-II-PO is UNBUDGETED (the MO-CAPO §4.2 baseline). The cost axis carries
# the fairness-of-comparison; iso-budget is not required. Uncomment the budget
# block below for an iso-budget robustness check (appendix material):
#
# budget:
#   max_budget: 7500000.0
#   unit: tokens
#   allow_overspend: false

nsga2_po:
  population_size: 16           # ACTIVE 500K v2; 1M RUN: 16
  max_generations: 5            # ACTIVE 500K v2; raise only after comparing seed 0
  offspring_per_generation: 4   # = MO-CAPO c
  crossover_probability: 1.0
  mutation_probability: 1.0
  mutate_after_crossover: true
  # Meta-LLM ON: CAPO §4 operator, must match FairCAPO. NSGA-II-PO is the
  # algorithmic baseline — it shares CAPO's operators, only the SEARCH algorithm
  # differs. Leaving this OFF while FairCAPO is ON handicaps the baseline.
  use_meta_llm: true
  objectives:
    - performance
    - cost
    - risk
    - fairness_risk

routing_preferences:
  - name: accuracy_first
    mode: accuracy_first
  - name: cost_first
    mode: cost_first
  - name: fairness_first
    mode: fairness_first
  - name: balanced
    mode: balanced
    performance: 1.0
    cost: 0.3
    risk: 1.0
    fairness: 1.0
